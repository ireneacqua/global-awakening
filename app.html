    const SUPABASE_URL = 'https://vxzxdkcluyrcftsnxxza.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ4enhka2NsdXlyY2Z0c254eHphIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzMzcyMTcsImV4cCI6MjA4NjkxMzIxN30.m_mzWHH1-ajVqeSFvuJAm8t5Kz7I7umcEKBrRPr5JXM';
    const SB_HEADERS = {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    };

    const supabase = {
      from: (table) => ({
        _table: table,
        _filters: [],
        _order: null,
        _limit: null,

        select(cols = '*') {
          const q = { ...this, _select: cols };
          q.order = function(col, opts) { this._order = { col, ...opts }; return this; };
          q.limit = function(n) { this._limit = n; return this; };
          q.eq = function(col, val) { this._filters.push(`${col}=eq.${val}`); return this; };
          q.neq = function(col, val) { this._filters.push(`${col}=neq.${val}`); return this; };
          q.lt = function(col, val) { this._filters.push(`${col}=lt.${val}`); return this; };
          q.then = async function(resolve) {
            let url = `${SUPABASE_URL}/rest/v1/${this._table}?select=${this._select}`;
            this._filters.forEach(f => url += '&' + f);
            if (this._order) url += `&order=${this._order.col}.${this._order.ascending ? 'asc' : 'desc'}`;
            if (this._limit) url += `&limit=${this._limit}`;
            try {
              const res = await fetch(url, { headers: SB_HEADERS });
              const data = await res.json();
              if (!res.ok) return resolve({ data: null, error: data });
              return resolve({ data, error: null });
            } catch(e) { return resolve({ data: null, error: e }); }
          };
          return q;
        },

        async insert(row) {
          try {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/${this._table}`, {
              method: 'POST', headers: SB_HEADERS, body: JSON.stringify(row)
            });
            const data = await res.json();
            if (!res.ok) return { data: null, error: data };
            return { data, error: null, select() { return { data, error: null }; } };
          } catch(e) { return { data: null, error: e }; }
        },

        async upsert(row) {
          try {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/${this._table}`, {
              method: 'POST',
              headers: { ...SB_HEADERS, 'Prefer': 'resolution=merge-duplicates,return=representation' },
              body: JSON.stringify(row)
            });
            const data = await res.json();
            if (!res.ok) return { data: null, error: data };
            return { data, error: null };
          } catch(e) { return { data: null, error: e }; }
        },

        update(row) {
          const ctx = { _table: this._table, _row: row, _filters: [] };
          ctx.eq = function(col, val) { this._filters.push(`${col}=eq.${val}`); return this; };
          ctx.then = async function(resolve) {
            let url = `${SUPABASE_URL}/rest/v1/${this._table}?`;
            url += this._filters.join('&');
            try {
              const res = await fetch(url, {
                method: 'PATCH', headers: SB_HEADERS, body: JSON.stringify(this._row)
              });
              const data = await res.json();
              if (!res.ok) return resolve({ data: null, error: data });
              return resolve({ data, error: null });
            } catch(e) { return resolve({ data: null, error: e }); }
          };
          return ctx;
        },

        delete() {
          const ctx = { _table: this._table, _filters: [] };
          ctx.eq = function(col, val) { this._filters.push(`${col}=eq.${val}`); return this; };
          ctx.neq = function(col, val) { this._filters.push(`${col}=neq.${val}`); return this; };
          ctx.lt = function(col, val) { this._filters.push(`${col}=lt.${val}`); return this; };
          ctx.then = async function(resolve) {
            let url = `${SUPABASE_URL}/rest/v1/${this._table}?`;
            url += this._filters.join('&');
            try {
              const res = await fetch(url, { method: 'DELETE', headers: SB_HEADERS });
              if (!res.ok) {
                let body = null;
                try { body = await res.json(); } catch(_) {}
                return resolve({ data: null, error: body || { status: res.status, message: res.statusText } });
              }
              let data = null;
              try { data = await res.json(); } catch(_) {}
              return resolve({ data, error: null });
            } catch(e) { return resolve({ data: null, error: e }); }
          };
          return ctx;
        }
      }),

      channel() { return { on() { return this; }, subscribe() { return this; }, unsubscribe() {} }; },

      // Chiamata a Postgres RPC (function) via PostgREST. Per RETURNS VOID i dati
      // sono null/vuoti; per RETURNS TABLE arriva un array di oggetti.
      rpc: async (fn, params) => {
        try {
          const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${fn}`, {
            method: 'POST',
            headers: SB_HEADERS,
            body: JSON.stringify(params || {})
          });
          let data = null;
          try { data = await res.json(); } catch(_) {}
          if (!res.ok) return { data: null, error: data || { status: res.status, message: res.statusText } };
          return { data, error: null };
        } catch(e) { return { data: null, error: e }; }
      }
    };

        .modal-overlay {
            position: fixed;

            /* mobile: le 3 statistiche restano su una riga (sono compatte), niente layout 2+1 sbilanciato */

</head>
<body>
<canvas id="starfield" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;pointer-events:none;"></canvas>
<script>
(function() {
  // Starfield "warp": stelle in prospettiva 3D che sfrecciano dal centro verso i bordi,
  // come viaggiando nello spazio. Leggero (~180 stelle, requestAnimationFrame), in pausa
  // quando l'app è in background, e quasi statico se l'utente preferisce ridurre le animazioni.
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  const BG = '#0c0f14';
  const STAR_COUNT = 340;
  const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const DRIFT = reduce ? 0.04 : 0.32; // deriva base (px/frame) → senso di viaggio nello spazio

  let W, H, stars = [], running = false, rafId = null;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  // Campo uniforme su TUTTO lo schermo → stelle sempre visibili ovunque (anche ai bordi).
  function place(s) {
    s.x = Math.random() * W;
    s.y = Math.random() * H;
    const r = Math.random();
    s.size = r < 0.70 ? 1.0 + Math.random() * 0.9
           : r < 0.93 ? 2.0 + Math.random() * 1.2
           :            3.5 + Math.random() * 1.8;
    s.depth = 0.35 + s.size / 4;        // più grande = più "vicina" = deriva più veloce (parallasse)
    s.bright = 0.6 + Math.random() * 0.4;
    s.tw = 0.001 + Math.random() * 0.004;
    s.to = Math.random() * Math.PI * 2;
    s.col = Math.random() < 0.12 ? '180, 220, 240' : '255, 255, 255';
  }

  function initStars() {
    stars = [];
    for (let i = 0; i < STAR_COUNT; i++) { const s = {}; place(s, false); stars.push(s); }
  }

  function draw(t) {
    ctx.fillStyle = BG;
    ctx.fillRect(0, 0, W, H);
    for (const s of stars) {
      // deriva (viaggio): verso il basso + lieve diagonale, più veloce per le stelle "vicine"
      s.y += DRIFT * s.depth;
      s.x += DRIFT * s.depth * 0.35;
      if (s.y > H + 2) { s.y = -2; s.x = Math.random() * W; }
      if (s.x > W + 2) { s.x = -2; }
      const flick = 0.8 + 0.2 * Math.sin(t * s.tw + s.to);
      const alpha = Math.min(1, s.bright * flick);
      ctx.fillStyle = `rgba(${s.col}, ${alpha})`;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
      ctx.fill();
    }
    if (running) rafId = requestAnimationFrame(draw);
  }

  function start() { if (!running) { running = true; rafId = requestAnimationFrame(draw); } }
  function stop() { running = false; if (rafId) { cancelAnimationFrame(rafId); rafId = null; } }

  document.addEventListener('visibilitychange', () => { document.hidden ? stop() : start(); });
  window.addEventListener('resize', () => { resize(); initStars(); });
  resize();
  initStars();
  start();
})();
</script>
    <div id="root"></div>
    
    <script src="app.js"></script>
</body>
